version: '3'

services:
  visitor_backend:
    image: node:18-alpine
    container_name: visitor_backend
    volumes:
      - ${REPO_PATH}:/backend
    environment:
      - PORT=${PORT}
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_PORT=5432
      - DB_HOST=postgres
    working_dir: /backend
    ports:
      - ${PORT}:8000
    command: sh -c "npm install && npm run start"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - visitor_network

  postgres:
    image: postgres:16
    container_name: visitor_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - ${POSTGRES_DATA_PATH}:/var/lib/postgresql/data
      - ${BACKUP_FILE_PATH}:/docker-entrypoint-initdb.d/init.sql
    networks:
      - visitor_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:9.8
    container_name: visitor_pgadmin
    ports:
      - ${PGADMIN_PORT}:80
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    networks:
      - visitor_network

networks:
  visitor_network:
    driver: bridge